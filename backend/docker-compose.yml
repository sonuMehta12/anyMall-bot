# docker-compose.yml
#
# PostgreSQL 16 for local development (Phase 1C).
#
# The backend owns its database — this file lives in backend/.
# Frontend has no database needs (it talks to the backend API).
#
# Usage:
#   docker compose up -d          Start PostgreSQL in the background
#   docker compose down            Stop PostgreSQL (data is kept)
#   docker compose down -v         Stop AND delete all data (fresh start)
#   docker compose ps              Check if container is running
#   docker compose logs postgres   View PostgreSQL logs
#
# Connect manually:
#   docker exec -it anymall-postgres psql -U anymall -d anymallchan

services:
  postgres:
    image: postgres:16-alpine
    container_name: anymall-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: anymallchan
      POSTGRES_USER: anymall
      POSTGRES_PASSWORD: anymall_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anymall -d anymallchan"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
